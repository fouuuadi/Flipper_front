name: Front Main Release

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - apps/**
      - public/**
      - package.json
      - package-lock.json
      - vite.config.ts
      - tsconfig.json
      - tsconfig.node.json
      - Dockerfile
      - nginx/**
      - .github/workflows/front-main-release.yml
  workflow_dispatch:

concurrency:
  group: front-main-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        app: [playfield, backglass, dmd]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Les modèles 3D (.glb) sont des blobs git normaux (plus de LFS),
        # le checkout récupère directement les binaires.

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          img="ghcr.io/${owner}/flipper-front-${{ matrix.app }}"
          {
            echo "image_ref=${img}:sha-${GITHUB_SHA}"
            echo "tags<<EOF"
            echo "${img}:sha-${GITHUB_SHA}"
            echo "${img}:main-latest"
            # Alias legacy `flipper-front` (= build playfield) pour ne pas
            # casser le déploiement k8s/gitops existant qui le référence.
            if [ "${{ matrix.app }}" = "playfield" ]; then
              legacy="ghcr.io/${owner}/flipper-front"
              echo "${legacy}:sha-${GITHUB_SHA}"
              echo "${legacy}:main-latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP=${{ matrix.app }}
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Trivy report (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.vars.outputs.image_ref }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Trivy gate (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.vars.outputs.image_ref }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          exit-code: 1
