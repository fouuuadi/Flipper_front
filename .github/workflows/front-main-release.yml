name: Front Main Release

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - public/**
      - index.html
      - package.json
      - package-lock.json
      - vite.config.ts
      - tsconfig.json
      - tsconfig.node.json
      - Dockerfile
      - nginx.conf
      - .github/workflows/front-main-release.yml
  workflow_dispatch:

concurrency:
  group: front-main-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: vars
        shell: bash
        run: |
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/flipper-front" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_name }}:sha-${{ github.sha }}
            ${{ steps.vars.outputs.image_name }}:main-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy report (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.vars.outputs.image_name }}:sha-${{ github.sha }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Trivy gate (CRITICAL only)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.vars.outputs.image_name }}:sha-${{ github.sha }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          exit-code: 1
