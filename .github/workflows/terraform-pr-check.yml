name: Terraform PR Check (Front)

on:
  pull_request:
    branches:
      - main
    paths:
      - deploy/terraform/front/**
      - .github/workflows/terraform-pr-check.yml
  workflow_dispatch:

concurrency:
  group: terraform-pr-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: deploy/terraform/front

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Write kubeconfig placeholder
        shell: bash
        run: |
          cat > /tmp/kubeconfig <<'EOF'
          apiVersion: v1
          kind: Config
          clusters:
            - name: local
              cluster:
                server: https://127.0.0.1:6443
          contexts:
            - name: local
              context:
                cluster: local
                user: local
          current-context: local
          users:
            - name: local
              user:
                token: placeholder
          EOF

      - name: Terraform init (no backend)
        env:
          TF_VAR_kubeconfig_path: /tmp/kubeconfig
        run: terraform init -backend=false

      - name: Terraform validate
        env:
          TF_VAR_kubeconfig_path: /tmp/kubeconfig
        run: terraform validate
