name: Update Flipper Center (Front)

on:
  push:
    branches:
      - main

jobs:
  update-center:
    runs-on: ubuntu-latest
    # Ce job ne fait qu'avancer le POINTEUR du submodule `front` dans
    # Flipper_Center : il n'a pas besoin du contenu réel des assets LFS (.glb).
    # On saute donc le smudge LFS, sinon le checkout du submodule laisse les
    # .glb « modifiés » et `submodule update` refuse de les écraser
    # (fatal: Unable to checkout ... in submodule path 'front').
    env:
      GIT_LFS_SKIP_SMUDGE: 1

    steps:
      - name: Checkout Flipper Center
        uses: actions/checkout@v4
        with:
          repository: fouuuadi/Flipper_Center
          token: ${{ secrets.CENTER_TOKEN }}
          submodules: true

      - name: Update front submodule
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # --force : écrase toute modif locale parasite du working tree du
          # submodule (smudge LFS résiduel) pour garantir l'avance du pointeur.
          git submodule update --remote --force front

          git add front
          git commit -m "Auto update front from ${GITHUB_REPOSITORY}@${GITHUB_SHA}" || echo "No changes"

          git pull --rebase
          git push https://x-access-token:${{ secrets.CENTER_TOKEN }}@github.com/fouuuadi/Flipper_Center.git main
