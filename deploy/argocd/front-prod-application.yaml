apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flipper-front-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fouuuadi/Flipper_front.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: flipper-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
