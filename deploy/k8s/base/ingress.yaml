apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flipper-front
spec:
  ingressClassName: nginx
  rules:
    - host: front.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flipper-front
                port:
                  number: 80
