server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Reverse-proxy vers le backend (même origine). Résolution DNS au runtime
    # via le resolver Docker (127.0.0.11) + variable : nginx démarre même si le
    # service `backend` est absent (ex. compose front-only) — la requête /api
    # renvoie alors 502, sans empêcher le serveur de tourner.
    resolver 127.0.0.11 ipv6=off valid=30s;

    location /api/ {
        set $backend_upstream backend:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
    }

    location /ws {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Fallback SPA : toute URL inconnue retourne index.html
    # (préparation pour les routes côté JS : /menu, /leaderboard, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
