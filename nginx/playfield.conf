server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Fallback SPA : toute URL inconnue retourne index.html
    # (préparation pour les routes côté JS : /menu, /leaderboard, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
